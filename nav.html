<!DOCTYPE html>
<html>
<head>
    <title>Navbar with Dropdown</title>

    <style>
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            color: white;
            text-decoration: none;
            padding: 14px 18px;
            font-size: 16px;
        }
        .navbar a:hover {
            background-color: #555;
        }
        .dropdown {
            float: left;
            overflow: hidden;
        }

        .dropdown .dropbtn {
            border: none;
            outline: none;
            color: white;
            padding: 14px 18px;
            background-color: inherit;
            font-size: 16px;
            cursor: pointer;
        }
        .dropdown:hover .dropbtn {
            background-color: #555;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
            z-index: 1;
        }
        .dropdown-content a {
            float: none;
            color: black;
            padding: 12px 16px;
            display: block;
            text-decoration: none;
        }
        .dropdown-content a:hover {
            background-color: #ddd;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        h1 {
            color: rgb(202, 167, 255);
            border: 2px solid rgb(0, 0, 0);
            text-align: center;
            font-size: 50px;
    </style>
</head>

<body>
    <h1>Sharon & Associates</h1>

<div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>

    <div class="dropdown">
        <button class="dropbtn">Services ▼</button>
        <div class="dropdown-content">
            <a href="#">Shipping</a>
            <a href="#">Consulting</a>
            <a href="#">Support</a>
        </div>
    </div>

    <a href="#">Contact</a>
</div>
 
</body>
</html>
